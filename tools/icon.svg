<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <!-- 背景径向渐变：深紫奇幻 -->
    <radialGradient id="bgGrad" cx="50%" cy="35%" r="80%">
      <stop offset="0%" stop-color="#432a8c"/>
      <stop offset="50%" stop-color="#261a58"/>
      <stop offset="100%" stop-color="#0d091e"/>
    </radialGradient>
    <!-- 卡片渐变 -->
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6b4cc4" stop-opacity="0.42"/>
      <stop offset="100%" stop-color="#281d5c" stop-opacity="0.6"/>
    </linearGradient>
    <!-- 金色渐变（符号主色）-->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffe89a"/>
      <stop offset="50%" stop-color="#ebc468"/>
      <stop offset="100%" stop-color="#c89232"/>
    </linearGradient>
    <!-- 金色亮（箭头）-->
    <linearGradient id="goldBright" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fff2b8"/>
      <stop offset="100%" stop-color="#ecc870"/>
    </linearGradient>
    <!-- 卡片阴影 -->
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="12"/>
      <feOffset dx="0" dy="10" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.45"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- 符号微光 -->
    <filter id="symGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- macOS Big Sur 标准 squircle 蒙版（精确超椭圆，填满 1024 画布）-->
    <clipPath id="mask">
      <path d="M 293.579 0.619 C 209.946 0.619 148.983 2.077 104.474 9.684 C 59.963 17.291 31.886 31.017 17.451 45.451 C 3.017 59.886 0 88.01 0 171.643 L 0 852.357 C 0 935.99 3.017 964.114 17.451 978.549 C 31.886 992.983 59.963 1006.709 104.474 1014.316 C 148.983 1021.923 209.946 1023.381 293.579 1023.381 L 730.421 1023.381 C 814.054 1023.381 875.017 1021.923 919.526 1014.316 C 964.037 1006.709 992.114 992.983 1006.549 978.549 C 1020.983 964.114 1024 935.99 1024 852.357 L 1024 171.643 C 1024 88.01 1020.983 59.886 1006.549 45.451 C 992.114 31.017 964.037 17.291 919.526 9.684 C 875.017 2.077 814.054 0.619 730.421 0.619 Z"/>
    </clipPath>
  </defs>

  <!-- 用标准 squircle 蒙版裁剪整个图标内容 -->
  <g clip-path="url(#mask)">
    <!-- 背景：填满整个画布（确保蒙版边缘无白边）-->
    <rect x="-10" y="-10" width="1044" height="1044" fill="url(#bgGrad)"/>

    <!-- 卡片（法术卡 / 卷轴）-->
    <g filter="url(#cardShadow)">
      <rect x="232" y="232" width="560" height="560" rx="82" ry="82"
            fill="url(#cardGrad)" stroke="url(#goldGrad)" stroke-width="5"/>
    </g>

    <!-- 装饰角线（D&D 卷轴感，呼应 BG3 法术卡）-->
    <g stroke="#e8c364" stroke-width="4" fill="none" opacity="0.6" stroke-linecap="round">
      <path d="M 272 272 L 332 272 M 272 272 L 272 332"/>
      <path d="M 752 272 L 692 272 M 752 272 L 752 332"/>
      <path d="M 272 752 L 332 752 M 272 752 L 272 692"/>
      <path d="M 752 752 L 692 752 M 752 752 L 752 692"/>
    </g>

    <!-- 主符号组：A → 文 -->
    <g filter="url(#symGlow)">
      <!-- 左侧 "A" -->
      <g fill="none" stroke="url(#goldGrad)" stroke-width="38"
         stroke-linecap="round" stroke-linejoin="round">
        <path d="M 352 672 L 416 352 L 480 672"/>
        <path d="M 380 556 L 452 556"/>
      </g>

      <!-- 中间箭头 -->
      <g stroke="url(#goldBright)" stroke-width="28" stroke-linecap="round"
         stroke-linejoin="round" fill="none">
        <path d="M 522 512 L 592 512"/>
        <path d="M 568 486 L 596 512 L 568 538"/>
      </g>

      <!-- 右侧 "文" -->
      <g stroke="url(#goldGrad)" stroke-width="36" stroke-linecap="round"
         stroke-linejoin="round" fill="none">
        <path d="M 680 366 L 680 388"/>
        <path d="M 632 424 L 728 424"/>
        <path d="M 680 424 L 622 680"/>
        <path d="M 680 424 L 738 680"/>
        <path d="M 680 424 L 680 610"/>
      </g>
    </g>
  </g>
</svg>
