name: 发布

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "发布标签，例如 v0.1.0"
        required: true
        type: string

permissions:
  contents: write

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}

jobs:
  build:
    name: 构建 ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows-x64-zh-CN
            os: windows-latest
            artifact_name: BG3-MOD-Hanhua-Windows-x64-zh-CN
            artifact_paths: |
              src-tauri/target/release/bg3-translate.exe
              src-tauri/target/release/bundle/msi/*.msi
              src-tauri/target/release/bundle/nsis/*setup.exe
          - name: macOS-arm64
            os: macos-15
            artifact_name: BG3-MOD-Hanhua-macOS-arm64
            artifact_paths: |
              src-tauri/target/release/bundle/dmg/*.dmg
          - name: macOS-x64
            os: macos-15-intel
            artifact_name: BG3-MOD-Hanhua-macOS-x64
            artifact_paths: |
              src-tauri/target/release/bundle/dmg/*.dmg

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装前端运行环境
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: 安装后端编译环境
        uses: dtolnay/rust-toolchain@stable

      - name: 安装依赖
        run: bun install --frozen-lockfile

      - name: 构建应用
        run: bun tauri build

      - name: 整理发布文件
        shell: pwsh
        env:
          ARTIFACT_PATHS: ${{ matrix.artifact_paths }}
          ARTIFACT_SUFFIX: ${{ matrix.name }}
        run: |
          New-Item -ItemType Directory -Force -Path release-bundles | Out-Null
          $patterns = $env:ARTIFACT_PATHS -split "`n" | ForEach-Object { $_.Trim() } | Where-Object { $_ }
          foreach ($pattern in $patterns) {
            Get-ChildItem -Path $pattern -File -ErrorAction SilentlyContinue | ForEach-Object {
              if ($_.Name -eq "bg3-translate.exe") {
                Compress-Archive -Path $_.FullName -DestinationPath (Join-Path release-bundles "BG3-MOD-Hanhua-$env:ARTIFACT_SUFFIX-Portable.zip") -Force
                return
              }
              $ext = [System.IO.Path]::GetExtension($_.Name)
              $kind = switch ($ext) {
                ".msi" { "MSI" }
                ".exe" { "Setup" }
                ".dmg" { "DMG" }
                default { "Bundle" }
              }
              Copy-Item $_.FullName -Destination (Join-Path release-bundles "BG3-MOD-Hanhua-$env:ARTIFACT_SUFFIX-$kind$ext")
            }
          }
          $count = (Get-ChildItem -Path release-bundles -File).Count
          if ($count -eq 0) {
            throw "没有找到可发布文件。"
          }

      - name: 上传发布文件
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: release-bundles/*
          if-no-files-found: error

  publish:
    name: 发布到 GitHub
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: 下载发布文件
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: 列出发布文件
        run: find release-assets -maxdepth 4 -type f -print

      - name: 创建或更新发布页
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: BG3 MOD 汉化工具 ${{ env.RELEASE_TAG }}
          body: |
            提供版本：

            - Windows x64（zh-CN）：MSI 安装包
            - Windows x64（zh-CN）：EXE 安装程序
            - Windows x64（zh-CN）：便携版
            - macOS arm64：DMG
            - macOS x64：DMG
          files: release-assets/**/*
          fail_on_unmatched_files: true
