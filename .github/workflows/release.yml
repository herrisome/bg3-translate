name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x64
            os: windows-latest
            artifact_name: BG3-Mod-Translator-windows-x64
            artifact_paths: |
              src-tauri/target/release/bundle/msi/*.msi
              src-tauri/target/release/bundle/nsis/*setup.exe
          - name: macos-arm64
            os: macos-15
            artifact_name: BG3-Mod-Translator-macos-arm64
            artifact_paths: |
              src-tauri/target/release/bundle/dmg/*.dmg
          - name: macos-x64
            os: macos-15-intel
            artifact_name: BG3-Mod-Translator-macos-x64
            artifact_paths: |
              src-tauri/target/release/bundle/dmg/*.dmg

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build Tauri app
        run: bun tauri build

      - name: Prepare release assets
        shell: pwsh
        env:
          ARTIFACT_PATHS: ${{ matrix.artifact_paths }}
          ARTIFACT_SUFFIX: ${{ matrix.name }}
        run: |
          New-Item -ItemType Directory -Force -Path release-bundles | Out-Null
          $patterns = $env:ARTIFACT_PATHS -split "`n" | ForEach-Object { $_.Trim() } | Where-Object { $_ }
          foreach ($pattern in $patterns) {
            Get-ChildItem -Path $pattern -File -ErrorAction SilentlyContinue | ForEach-Object {
              $base = [System.IO.Path]::GetFileNameWithoutExtension($_.Name)
              $ext = [System.IO.Path]::GetExtension($_.Name)
              Copy-Item $_.FullName -Destination (Join-Path release-bundles "$base-$env:ARTIFACT_SUFFIX$ext")
            }
          }
          $count = (Get-ChildItem -Path release-bundles -File).Count
          if ($count -eq 0) {
            throw "No bundle artifacts found."
          }

      - name: Upload bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: release-bundles/*
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download bundle artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Show assets
        run: find release-assets -maxdepth 4 -type f -print

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: BG3 Mod Translator ${{ env.RELEASE_TAG }}
          body: |
            Automated desktop builds.

            - Windows x64: MSI and NSIS installer
            - macOS Apple Silicon: DMG
            - macOS Intel: DMG
          files: release-assets/**/*
          fail_on_unmatched_files: true
